<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nav Mockup — André Bowen</title>
  <meta name="color-scheme" content="light dark">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
  <script>(function(){var t=localStorage.getItem('md-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    /* Override nav link states — underline only */
    .nav-links a {
      padding: 4px 6px 8px;
      border-radius: 0;
      background: transparent;
      color: var(--md-sys-color-on-surface-variant);
      transition: color var(--md-sys-motion-duration-short3) var(--md-sys-motion-easing-standard);
    }

    /* Remove state layer chip */
    .nav-links a::before { display: none; }

    /* Underline for both hover and active */
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 6px;
      right: 6px;
      height: 1.5px;
      background: var(--md-sys-color-on-surface-variant);
      border-radius: 1.5px;
      transform: scaleX(0);
      transition: transform var(--md-sys-motion-duration-short3) var(--md-sys-motion-easing-standard),
                  background var(--md-sys-motion-duration-short3) var(--md-sys-motion-easing-standard);
    }

    .nav-links a:hover { color: var(--md-sys-color-on-surface); }
    .nav-links a:hover::after {
      transform: scaleX(1);
      background: var(--md-sys-color-on-surface-variant);
    }

    .nav-links a.active { color: var(--md-sys-color-on-surface); }
    .nav-links a.active::after {
      transform: scaleX(1);
      background: var(--md-sys-color-on-surface);
    }
  </style>
</head>
<body>

<header>
  <nav>
    <a href="index.html" class="logo">André Bowen</a>
    <ul class="nav-links">
      <li><a href="still-life.html">Still Life</a></li>
      <li><a href="landscape.html" class="active">Landscape</a></li>
      <li><a href="figure.html">Figure</a></li>
      <li><a href="drawings.html">Drawings</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="hamburger" aria-label="Open menu">
      <span></span><span></span>
    </button>
    <button class="theme-toggle" aria-label="Toggle dark mode">
      <svg class="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </nav>
</header>
